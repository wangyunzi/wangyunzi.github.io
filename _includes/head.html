<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | replace: ' ', '%20' }}{% else %}{{ site.description }}{% endif %}">

    <!-- Fonts -->
    <link rel="stylesheet" href="{{ "/assets/css/fonts/family=Merriweather.css" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ "/assets/css/fonts/family=Lato.css" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ "/assets/css/fonts/family=Source.css" | prepend: site.baseurl }}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://blog.wangyunzi.com/json/fontawesome6.6.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">

    <!-- Favicon and Apple Touch Icons -->
    <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico" type="image/x-icon">
    <link rel="icon" href="{{ site.baseurl }}/favicon.ico" type="image/x-icon">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | prepend: site.baseurl | prepend: site.url }}">

    <!-- 添加全文搜索 -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    {% seo %}
</head>
