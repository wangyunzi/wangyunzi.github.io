{% if site.pagination and page.home_preview != true %}
  {% if page.home %}
    <div class="{% if paginator.total_pages > 1 %}pagination{% else %}no_pagination{% endif %}">
      {% if paginator.previous_page %}
        {% if paginator.page == 2 %}
          <a class="prev" href="{{ site.baseurl }}/">
            <i class="fas fa-chevron-left"></i>
          </a>
        {% else %}
          <a class="prev" href="{{ site.baseurl }}/page/{{ paginator.previous_page }}/">
            <i class="fas fa-chevron-left"></i>
          </a>
        {% endif %}
      {% else %}
        <span class="disabled">
          <i class="fas fa-minus"></i>
        </span>
      {% endif %}

      {% if paginator.next_page %}
        <a class="next" href="{{ site.baseurl }}/page/{{ paginator.next_page }}/">
          <i class="fas fa-chevron-right"></i>
        </a>
      {% else %}
        <span class="next disabled">
          <i class="fas fa-minus"></i>
        </span>
      {% endif %}
    </div>
  {% endif %}
{% endif %}
