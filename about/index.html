<p style="text-indent:0"><span class="drop-cap">你</span>好，我叫王云子（网名），目前大学生一枚，喜欢听歌、运动、阅读，时而假装文艺，时而装傻充愣，喜欢的歌曲有很多，喜欢的书籍同样很多，看书喜欢随心所欲，什么类型的书都会看一点，但是最感兴趣的还是心理学方面的书籍，如果你也有感兴趣的书籍或是音乐也可以和我尽情交流。</p>
